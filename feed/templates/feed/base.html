<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agency{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'feed/css/style.css' %}">
    <link rel="alternate" type="application/rss+xml" title="Agency RSS" href="{% url 'feed:rss_feed' %}">
</head>
<body>
    <header>
        <h1><a href="{% url 'feed:home' %}">Agency</a><h1>
        <nav>
            <a href="{% url 'feed:home' %}">Home</a> |
            <a href="{% url 'feed:rss_feed' %}">RSS</a> |
            <a href="{% url 'feed:reader' %}">Reader</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; {{ 'now'|date:"Y" }}</p>
    </footer>
</body>
</html>
